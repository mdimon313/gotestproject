[build]
  # Go code-ke Linux binary te build korbe netlify functions er jonno
  command = "GOOS=linux go build -o netlify/functions/api netlify/functions/api/main.go"
  publish = "public"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200